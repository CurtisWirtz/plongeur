services:
 db:
   image: postgres:17
   environment:
     POSTGRES_DB: ${DATABASE_NAME}
     POSTGRES_USER: ${DATABASE_USERNAME}
     POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
   ports:
     - "5432:5432"
   volumes:
     - postgres_data:/var/lib/postgresql/data
 
 backend:
   build:
     context: ./backend
     dockerfile: Dockerfile.dev
   container_name: django-backend
   ports:
     - "8000:8000"
   depends_on:
     - db
   environment:
     DJANGO_ENV: ${DJANGO_ENV}
     DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
     DEBUG: ${DJANGO_DEBUG}
     DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
     DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
     DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
     DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
     DATABASE_ENGINE: ${DATABASE_ENGINE}
     DATABASE_NAME: ${DATABASE_NAME}
     DATABASE_USERNAME: ${DATABASE_USERNAME}
     DATABASE_PASSWORD: ${DATABASE_PASSWORD}
     DATABASE_HOST: ${DATABASE_HOST}
     DATABASE_PORT: ${DATABASE_PORT}
   volumes:
     - ./backend:/app # for hot reload

 pgadmin:
   image: dpage/pgadmin4
   container_name: pgadmin4_container
   restart: always
   environment:
     # These are the credentials to log INTO the pgAdmin web interface, not the DB
     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
   ports:
     - "8080:80" # When running, access pgAdmin on at http://localhost:8080
   volumes:
     - pgadmin_data:/var/lib/pgadmin # To persist the pgAdmin config and server list

 frontend:
   build:
     context: ./frontend
     dockerfile: Dockerfile.dev
   container_name: vite-frontend
   environment:
     VITE_API_URL: ${VITE_API_URL}
   ports:
     - "5173:5173"
   volumes:
     - ./frontend:/app

volumes:
   postgres_data:
   pgadmin_data: